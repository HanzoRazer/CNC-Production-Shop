name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check .

      - name: Type check with mypy
        run: mypy business --ignore-missing-imports

      - name: Test with pytest
        run: pytest --cov=business --cov-report=term-missing --cov-fail-under=90

      - name: Verify core imports
        run: |
          python -c "import business.bids.calculator"
          python -c "import business.bids.generator"
          python -c "import business.proposals.generator"

      - name: Validate fixtures
        run: |
          python scripts/validate_eco_loom_fixture.py
          python scripts/validate_eco_loom_project.py
          python scripts/validate_bid_fixtures.py
          python scripts/validate_bid_summaries.py
          python scripts/validate_proposals.py
